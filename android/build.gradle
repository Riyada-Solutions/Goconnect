// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

subprojects {
  if (project.name != 'app') {
    def safeName = project.name.replaceAll(/[^a-zA-Z0-9_-]/, '_')
    buildDir = "D:/build/${safeName}"
  }

  afterEvaluate {
    if (project.name == "react-native-keyboard-controller") {
      try {
        android.sourceSets.main.java.srcDirs = android.sourceSets.main.java.srcDirs.findAll {
          !it.path.contains("codegen")
        }
      } catch (Exception ignored) {}
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
